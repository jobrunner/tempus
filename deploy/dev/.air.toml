root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/tempus ./cmd/tempus"
  bin = "./tmp/tempus"
  include_ext = ["go", "yaml", "yml", "json"]
  exclude_dir = ["tmp", "data", ".go", "coverage", "deploy", "docs", "site", "node_modules"]
  exclude_regex = ["_test\\.go"]
  delay = 1500
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = false

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
