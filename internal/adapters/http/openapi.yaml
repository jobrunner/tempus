openapi: 3.0.3
info:
  title: tempus API
  version: 0.1.0
  description: Coordinate + time feature queries with per-feature attribution.
servers:
  - url: /api/v1
paths:
  /query:
    get:
      summary: Query cached feature providers for a coordinate and time
      parameters:
        - {name: lat, in: query, required: true, schema: {type: number}}
        - {name: lon, in: query, required: true, schema: {type: number}}
        - {name: datetime, in: query, required: true, schema: {type: string}, description: "RFC3339 or YYYY-MM-DDTHH:MM[:SS]; no offset => UTC; must not be in the future"}
        - {name: providers, in: query, required: false, schema: {type: string}, description: comma-separated provider ids}
      responses:
        "200":
          description: Feature collection with per-provider status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /providers:
    get:
      summary: List available providers and their attribution
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderInfo"
components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    License:
      type: object
      required: [name, url, attribution]
      properties:
        name:
          type: string
        url:
          type: string
        attribution:
          type: string
    Feature:
      type: object
      properties:
        type:
          type: string
        geometry:
          type: object
        properties:
          type: object
        license:
          $ref: "#/components/schemas/License"
    ProviderStatus:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [ok, unavailable, error]
        cached:
          type: boolean
        retryable:
          type: boolean
        retryAfter:
          type: string
          description: "Go duration string indicating how long to wait before retrying (e.g. \"30s\", \"2h0m0s\")"
        error:
          type: string
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        license:
          $ref: "#/components/schemas/License"
    BilingualLabel:
      type: object
      description: A label available in German and English.
      properties:
        de:
          type: string
          description: German label.
        en:
          type: string
          description: English label.
    WeatherFeatureProperties:
      type: object
      description: >
        Properties of a weather feature (kind "weather") returned by the
        Open-Meteo provider. In addition to numeric measurements such as
        temperature2m, relativeHumidity2m, precipitation, windSpeed10m,
        cloudCover, and weatherCode, the feature carries isDay (computed from
        the sun's elevation angle via the NOAA approximation, not from the
        weather provider — Open-Meteo's archive is_day is unreliable for
        historical dates), isDaySource (citation for the solar computation), a
        bilingual human-readable explanation of the WMO weather code and its
        source citation.
      properties:
        isDay:
          type: boolean
          description: >
            Whether it is daytime at the queried location and instant.
            Computed from the sun's elevation angle (NOAA Spencer approximation);
            true when the sun is above −0.833° (refraction + solar radius
            threshold). Not sourced from the weather provider.
        isDaySource:
          type: string
          description: >
            Citation for the isDay computation: "Tag/Nacht aus Sonnenstand
            berechnet (NOAA-Näherung), tempus".
        weatherCode:
          type: integer
          description: >
            WMO weather-interpretation code (Code Table 4677, Open-Meteo subset).
        weatherCodeDescription:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual (DE + EN) human-readable description of the WMO weather
            code; present when the code is a known WMO Code Table 4677 value.
        weatherCodeSource:
          type: string
          description: >
            Source citation for the weatherCodeDescription, referencing
            "WMO Code Table 4677 (WW – present weather); weather-interpretation
            codes as used by Open-Meteo".
    DewPointFeatureProperties:
      type: object
      description: >
        Properties of a dew-point feature (kind "dewpoint") derived from the
        weather feature using the Magnus-Tetens formula. Includes the computed
        dew point, its unit, derivation metadata, and a bilingual comfort
        classification with source attribution.
      properties:
        dewPoint2m:
          type: number
          description: Dew point at 2 m height in °C (rounded to 0.1 °C).
        comfort:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual (DE + EN) human-comfort classification of the dew point
            (e.g. "sehr angenehm" / "very comfortable"). Based on the standard
            meteorological dew-point comfort scale.
        comfortSource:
          type: string
          description: >
            Source citation for the comfort classification, referencing the
            standard meteorological dew-point comfort scale.
    QueryResult:
      type: object
      description: >
        Feature collection with per-provider status. The features[] array may
        include a weather feature (kind "weather") with WMO code descriptions
        (weatherCodeDescription DE/EN, weatherCodeSource) and a derived feature
        with kind "dewpoint" containing a dewPoint2m property (°C,
        Magnus-Tetens formula) plus a comfort classification (comfort DE/EN,
        comfortSource). The providers[] array may include an entry with id
        "dewpoint" reflecting the derivation status.
      properties:
        query:
          type: object
        features:
          type: array
          items:
            $ref: "#/components/schemas/Feature"
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderStatus"
