openapi: 3.0.3
info:
  title: tempus API
  version: 0.1.0
  description: Coordinate + time feature queries with per-feature attribution.
servers:
  - url: /api/v1
paths:
  /query:
    get:
      summary: Query cached feature providers for a coordinate and time
      parameters:
        - {name: lat, in: query, required: true, schema: {type: number}}
        - {name: lon, in: query, required: true, schema: {type: number}}
        - {name: datetime, in: query, required: true, schema: {type: string}, description: "RFC3339 or YYYY-MM-DDTHH:MM[:SS]; no offset => UTC. Future instants are allowed: astronomy providers (sun/moon) compute for any date, while providers that cannot serve the future (weather) report a non-retryable error status in the envelope."}
        - {name: providers, in: query, required: false, schema: {type: string}, description: comma-separated provider ids}
      responses:
        "200":
          description: Feature collection with per-provider status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /providers:
    get:
      summary: List available providers and their attribution
      responses:
        "200":
          description: Provider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProviderInfo"
components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
    License:
      type: object
      required: [name, url, attribution]
      properties:
        name:
          type: string
        url:
          type: string
        attribution:
          type: string
    Feature:
      type: object
      properties:
        type:
          type: string
        geometry:
          type: object
        properties:
          type: object
        license:
          $ref: "#/components/schemas/License"
    ProviderStatus:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [ok, unavailable, error]
        cached:
          type: boolean
        retryable:
          type: boolean
        retryAfter:
          type: string
          description: "Go duration string indicating how long to wait before retrying (e.g. \"30s\", \"2h0m0s\")"
        error:
          type: string
    ProviderInfo:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
        license:
          $ref: "#/components/schemas/License"
    BilingualLabel:
      type: object
      description: A label available in German and English.
      properties:
        de:
          type: string
          description: German label.
        en:
          type: string
          description: English label.
    WeatherFeatureProperties:
      type: object
      description: >
        Properties of a weather feature (kind "weather") returned by the
        Open-Meteo provider. In addition to numeric measurements such as
        temperature2m, relativeHumidity2m, precipitation, windSpeed10m,
        cloudCover, and weatherCode, the feature carries isDay (computed from
        the sun's elevation angle via the NOAA approximation, not from the
        weather provider — Open-Meteo's archive is_day is unreliable for
        historical dates), isDaySource (citation for the solar computation), a
        bilingual human-readable explanation of the WMO weather code and its
        source citation.
      properties:
        isDay:
          type: boolean
          description: >
            Whether it is daytime at the queried location and instant.
            Computed from the sun's elevation angle (NOAA Spencer approximation);
            true when the sun is above −0.833° (refraction + solar radius
            threshold). Not sourced from the weather provider.
        isDaySource:
          type: string
          description: >
            Citation for the isDay computation: "Tag/Nacht aus Sonnenstand
            berechnet (NOAA-Näherung), tempus".
        weatherCode:
          type: integer
          description: >
            WMO weather-interpretation code (Code Table 4677, Open-Meteo subset).
        weatherCodeDescription:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual (DE + EN) human-readable description of the WMO weather
            code; present when the code is a known WMO Code Table 4677 value.
        weatherCodeSource:
          type: string
          description: >
            Source citation for the weatherCodeDescription, referencing
            "WMO Code Table 4677 (WW – present weather); weather-interpretation
            codes as used by Open-Meteo".
    DewPointFeatureProperties:
      type: object
      description: >
        Properties of a dew-point feature (kind "dewpoint") derived from the
        weather feature using the Magnus-Tetens formula. Includes the computed
        dew point, its unit, derivation metadata, and a bilingual comfort
        classification with source attribution.
      properties:
        dewPoint2m:
          type: number
          description: Dew point at 2 m height in °C (rounded to 0.1 °C).
        comfort:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual (DE + EN) human-comfort classification of the dew point
            (e.g. "sehr angenehm" / "very comfortable"). Based on the standard
            meteorological dew-point comfort scale.
        comfortSource:
          type: string
          description: >
            Source citation for the comfort classification, referencing the
            standard meteorological dew-point comfort scale.
    SunFeatureProperties:
      type: object
      description: >
        Properties of a sun feature (kind "sun"), computed from the coordinate
        and instant via the NOAA solar approximation. Available for any date
        (past or future). All angles are in degrees; azimuth is measured
        clockwise from true north. Event times are RFC3339 UTC, or null when the
        event does not occur that day (polar day/night at the given threshold).
      properties:
        elevationDeg:
          type: number
          description: Sun elevation above the horizon (degrees).
        azimuthDeg:
          type: number
          description: Sun azimuth, degrees clockwise from true north.
        zenithDeg:
          type: number
          description: Solar zenith angle (90 − elevation), degrees.
        lightPhase:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual light-regime label: day, civil / nautical / astronomical
            twilight, or night.
        sunrise:
          type: string
          nullable: true
          description: Sunrise (RFC3339 UTC) for the day, or null (polar day/night).
        sunset:
          type: string
          nullable: true
          description: Sunset (RFC3339 UTC) for the day, or null (polar day/night).
        solarNoon:
          type: string
          nullable: true
          description: Solar noon (RFC3339 UTC).
        solarNoonElevationDeg:
          type: number
          description: Sun elevation at solar noon (degrees).
        dayLengthMinutes:
          type: number
          description: Length of daylight (minutes) between sunrise and sunset.
        twilight:
          type: object
          description: >
            Civil (−6°), nautical (−12°) and astronomical (−18°) twilight, each
            with a dawn and dusk time (RFC3339 UTC or null).
          properties:
            civil: {type: object}
            nautical: {type: object}
            astronomical: {type: object}
    MoonFeatureProperties:
      type: object
      description: >
        Properties of a moon feature (kind "moon"), computed from the coordinate
        and instant via Meeus's lunar theory (geocentric approximation).
        Available for any date. Angles in degrees, azimuth clockwise from true
        north. Rise/set times are RFC3339 UTC, or null when no crossing occurs.
      properties:
        elevationDeg:
          type: number
          description: Moon elevation above the horizon (degrees, geocentric).
        azimuthDeg:
          type: number
          description: Moon azimuth, degrees clockwise from true north.
        distanceKm:
          type: number
          description: Earth–moon centre distance (km).
        illuminationPct:
          type: number
          description: Illuminated fraction of the moon's disc (percent).
        phaseAngleDeg:
          type: number
          description: Phase angle (degrees; 0 = full, 180 = new).
        ageDays:
          type: number
          description: Moon age since the last new moon (days).
        phase:
          $ref: "#/components/schemas/BilingualLabel"
          description: >
            Bilingual phase name (Neumond … abnehmende Sichel / New Moon …
            Waning Crescent).
        moonrise:
          type: string
          nullable: true
          description: Moonrise (RFC3339 UTC), or null when the moon does not rise that day.
        moonset:
          type: string
          nullable: true
          description: Moonset (RFC3339 UTC), or null when the moon does not set that day.
    QueryResult:
      type: object
      description: >
        Feature collection with per-provider status. The features[] array may
        include a weather feature (kind "weather") with WMO code descriptions
        (weatherCodeDescription DE/EN, weatherCodeSource) and a derived feature
        with kind "dewpoint" containing a dewPoint2m property (°C,
        Magnus-Tetens formula) plus a comfort classification (comfort DE/EN,
        comfortSource). It also includes a sun feature (kind "sun") and a moon
        feature (kind "moon"), computed for any date; see SunFeatureProperties
        and MoonFeatureProperties. The providers[] array may include entries
        with ids "sun", "moon" and "dewpoint" reflecting their status; for
        future instants the "open-meteo" weather provider reports a
        non-retryable error while sun and moon remain "ok".
      properties:
        query:
          type: object
        features:
          type: array
          items:
            $ref: "#/components/schemas/Feature"
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderStatus"
