name: CI

on:
  push:
    branches: [main, master, feat/**, fix/**, chore/**]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          go test -coverprofile=coverage/coverage.out -covermode=atomic ./...
          go tool cover -func=coverage/coverage.out
      - name: Coverage gate
        run: ./scripts/coverage-gate.sh coverage/coverage.out

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - run: go vet ./...

  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
          args: --enable-only depguard,gomodguard
      - name: go mod tidy check
        run: go mod tidy -diff
      - name: Debt guard
        run: ./scripts/debt-guard.sh

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Build binary
        run: go build -o tempus ./cmd/tempus

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -quiet ./...

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [lint, test, vet, architecture, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.2
      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest
      - name: Full verify
        run: |
          make fmt-check
          make vet
          make arch
          make debt-guard
          go build ./...
